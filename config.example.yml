global:
  listen: lo         # IP or interface (e.g. 192.168.1.10, eth0, lo) or unix socket path 
                     # (unix:///run/routemux.sock). Empty = all interfaces
  port: ${env.HTTP_PORT:9090}  # HTTP listen Port value obtained from env variable, with optional default
  #global-tls-cert: /path/to/cert.pem
  #global-tls-key:  /path/to/key.pem
  #acme:                              # Automatic TLS certificates (ACME / Let's Encrypt, ZeroSSL, ...)
  #  email: admin@example.com         # Account contact (required when any vhost uses acme-source)
  #  cache-dir: /var/lib/routemux/acme # Account storage + default cert location
  #                                    # (default: /var/lib/routemux/acme as root,
  #                                    #  else $HOME/.local/share/routemux)
  #  challenge-mode: http             # http = HTTP-01 (default), https = TLS-ALPN-01
  #  serve-port80: true               # Open a temporary port-80 listener during a HTTP-01
  #                                   # challenge window if RouteMUX isn't already on :80
  #  directory-url: ...               # Optional: override the ACME directory (staging/private CA)
  #  ca-root-file: /path/ca.pem       # Optional: trust this CA for the ACME endpoint (test servers)
  #  insecure-skip-verify: false      # Optional: skip ACME endpoint TLS verify (TESTING ONLY)
  global-auth: ["admin", "s3cr3t"]   # HTTP Basic Auth for all routes
  #trust-client-headers: true    # Trust X-Forwarded-* headers for all connections
  trusted-proxies:               # Trust X-Forwarded-* headers only for these IPs/CIDRs
    # --- Private IP ranges
    - 192.168.0.0/16
    - 172.16.0.0/12
    - 10.0.0.0/8
    - 127.0.0.1/8
    - fd00::/8
    - ::1
    # --- Cloudflare IP lists
    - https://www.cloudflare.com/ips-v4 cache=/tmp/cacheCFiplist refresh=36h
    - https://www.cloudflare.com/ips-v6 cache=/tmp/cacheCFipv6list refresh=36h
  ip-filter:                     # Block and allow IP addresses/ CIDR ranges
    blocked:
      - 10.0.0.0/8
      #- ./allowIPs.txt refresh=2h
    allowed:
      - 172.16.0.0/12
      - 127.0.0.1
      - ::1
      - https://www.cloudflare.com/ips-v4 cache=/tmp/cacheCFlist refresh=5h
  jwt-authentication:
    header-key: Cf-Access-Jwt-Assertion    # Get JWT from header
    #cookie-key: CF_Authorization          # Get JWT from cookie
    claim-user-key: email                  # JWT claim key to obtain the username
    #secret: hmac-secret-key               # Shared secret signing key
    jwk-url: https://team.cloudflareaccess.com/cdn-cgi/access/certs  # JSON Web Key (JWK) URL
                                           # If secret and jwk-url both not set, then it will
                                           # try to get JWK URL for cloudflare or Auth0 based
                                           # on 'iss' claim value.
    #aud-id: my-app-audience-id            # JWT Audience ID to match
    #default-allow-all: true               # Allow all authenticated users by default for the
                                           # routes without auth-users specified

vhosts:
  - domains: ["example.com", "www.example.com"]
    #tls:                             # Per-vhost TLS (supersedes global tls-cert/tls-key)
    #  acme-source: letsencrypt       # Auto-issue via ACME: letsencrypt, letsencrypt-staging, or zerossl
    #                                  #   (presence of acme-source enables automatic issuance)
    #  cert: /path/example.crt        # Optional: where the issued cert is written
    #                                  #   (default: cache-dir/<shortest-domain>.crt)
    #  key:  /path/example.key        # Optional: matching key (default: cache-dir/<shortest-domain>.key)
    #                                  # Without acme-source, cert/key are served as a static pair.
    #  acme-renewal: 30d              # Optional: renew this many days before expiry
    #                                  #   (default: when 1/3 of the cert lifetime remains)
    routes:
      /api/:
        dest: http://localhost:3000/v1/
        timeout: 30s
        #noTLSverify: true
        auth: ["apiuser", "apipass"]   # overrides global-auth for this route
        #auth-users: ["user1", "user2"]   # JWT authenticated users for this route
        skip-jwt-auth: true            # skip JWT authentication for this route
        dest-add-header:                # add-header supersedes delete-header
          #Host: somesite.com      # Overwrite client HOST header
          x-Proxy-Server: RouteMUX
          x-forwarded-for: 1.1.1.1  # By default X-Forwarded-For is set to client sent header appended with proxy's connecting IP
          X-Client-IP:     ${remote_addr}        # client/connecting IP
          X-Original-IP:   ${trusted_xff}        # Real IP after evaluating trusted-proxies on X-Forwarded-For chain
          X-Original-UA: ${header.User-Agent}  # copy from original client headers
          x-rebuilt-url: ${scheme}://${header.host}${request_uri}
        
        dest-del-header: 
          - Host           # If HOST header is deleted, then upstream host will be used
          - 'X-*'

        client-add-header:               # headers added to the response sent back to the client
          X-Served-By: RouteMUX
          Cache-Control: no-store
          X-Client-IP: ${remote_addr}    # client IP address
          X-Request-Host: ${host}        # original Host header from client
          #X-Upstream-Id: ${header.X-Node-Id}  # from upstream response header

        client-del-header:               # headers removed from upstream response
          - Server
          - X-Powered-By
          - X-Internal-*

      /app/:
        dest: 
          - http://localhost:8000/ weight=2
          - http://localhost:8001/
          - http://localhost:8002/ weight=1
        load-balancer-mode: round-robin  # default is 'random'
        timeout: 120s
        auth-users: ["user1", "user2"]   # JWT authenticated users for this route

      /health/:
        dest: STATUS 200 Health is OK
        auth:   # empty or [] disable global auth
        client-add-header:
          Cache-Control: no-store
          X-Served-By: RouteMUX

      # Public route — explicitly disables HTTP auth even when global-auth is set:
      # /public/:
      #   dest: http://localhost:9000/
      #   auth: []
      
      # HTTP 302 redirection using static response and client header manipulation
      /redirect/:
        dest: STATUS 302 Redirection to new site
        client-add-header:
          Location: https://google.com

      /static-file/:
        dest: FILE 200 /var/www/index.html
        # If the path is a file, then it will be served as static file
        # Optional content type specified, otherwise detected from file extension
        # dest: FILE 200 /var/www/data.json application/json
      
      /fileserver/:
        dest: FILE /var/www/
        # If the path is a directory, then it will be served as file server
        # Directory listing is disabled by default. To enable directory listing,
        # dest: FILE-BROWSE /var/www/

  - domains: ["*"]
    routes:
      /:
        dest: http://localhost:9000/
