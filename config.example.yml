global:
  listen: lo         # IP or interface (e.g. 192.168.1.10, eth0, lo). Empty = all interfaces
  port: ${env.HTTP_PORT:9090}  # Port value obtained from env variable, with optional default
  #tls-cert: /path/to/cert.pem
  #tls-key:  /path/to/key.pem
  global-auth: ["admin", "s3cr3t"]   # HTTP Basic Auth for all routes
  #trust-client-headers: true    # Trust X-Forwarded-* headers for all connections
  trusted-proxies:               # Trust X-Forwarded-* headers only for these IPs/CIDRs
    # --- Private IP ranges
    - 192.168.0.0/16
    - 172.16.0.0/12
    - 10.0.0.0/8
    - 127.0.0.1/8
    - fd00::/8
    - ::1
    # --- Cloudflare IP lists
    - https://www.cloudflare.com/ips-v4 cache=/tmp/cacheCFiplist refresh=36h
    - https://www.cloudflare.com/ips-v6 cache=/tmp/cacheCFipv6list refresh=36h
  ip-filter:                     # Block and allow IP addresses/ CIDR ranges
    blocked:
      - 10.0.0.0/8
      #- ./allowIPs.txt refresh=2h
    allowed:
      - 172.16.0.0/12
      - 127.0.0.1
      - ::1
      - https://www.cloudflare.com/ips-v4 cache=/tmp/cacheCFlist refresh=5h

vhosts:
  - domains: ["example.com", "www.example.com"]
    routes:
      /api/:
        dest: http://localhost:3000/v1/
        timeout: 30s
        #noTLSverify: true
        auth: ["apiuser", "apipass"]   # overrides global-auth for this route
        dest-add-header:                # add-header supersedes delete-header
          #Host: somesite.com      # Overwrite client HOST header
          x-Proxy-Server: RouteMUX
          x-forwarded-for: 1.1.1.1  # By default X-Forwarded-For is set to client sent header appended with proxy's connecting IP
          X-Client-IP:     ${remote_addr}        # client/connecting IP
          X-Original-IP:   ${trusted_xff}        # Real IP after evaluating trusted-proxies on X-Forwarded-For chain
          X-Original-UA: ${header.User-Agent}  # copy from original client headers
          x-rebuilt-url: ${scheme}://${header.host}${request_uri}
        
        dest-del-header: 
          - Host           # If HOST header is deleted, then upstream host will be used
          - 'X-*'

        client-add-header:               # headers added to the response sent back to the client
          X-Served-By: RouteMUX
          Cache-Control: no-store
          X-Client-IP: ${remote_addr}    # client IP address
          X-Request-Host: ${host}        # original Host header from client
          #X-Upstream-Id: ${header.X-Node-Id}  # from upstream response header

        client-del-header:               # headers removed from upstream response
          - Server
          - X-Powered-By
          - X-Internal-*

      /app/:
        dest: 
          - http://localhost:8000/ weight=2
          - http://localhost:8001/
          - http://localhost:8002/ weight=1
        load-balancer-mode: round-robin  # default is 'random'
        timeout: 120s

      /health/:
        dest: STATUS 200 Health is OK
        auth: ""   # disable global auth
        client-add-header:
          Cache-Control: no-store
          X-Served-By: RouteMUX
      
      # HTTP 302 redirection using static response and client header manipulation
      /redirect/:
        dest: STATUS 302 Redirection to new site
        client-add-header:
          Location: https://google.com

      /file/:
        dest: FILE 200 /var/www/index.html
        # Optional content type specified, otherwise detected from file extension
        # dest: FILE 200 /var/www/data.json application/json

      # Public route — explicitly disables auth even when global-auth is set:
      # /public/:
      #   dest: http://localhost:9000/
      #   auth: []

  - domains: ["*"]
    routes:
      /:
        dest: http://localhost:9000/
